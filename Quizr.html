<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quizr – GUC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green:       #568E14;
    --green-dark:  #3A6409;
    --green-mid:   #7CB52A;
    --green-light: #D4EDAA;
    --green-pale:  #EFF7E0;
    --orange:      #DD5900;
    --orange-pale: #FDEEE5;
    --yellow:      #FFC72C;
    --n1:          #cc3947;
    --n2:          #65337c;
    --n3:          #2c9aa6;
    --bg:          #F8FCF2;
    --card:        #FFFFFF;
    --ink:         #1A2410;
    --ink2:        #556040;
    --border:      #C6DCA0;
    --radius:      14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; display: flex; flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--green);
    padding: 0 24px;
    display: flex; align-items: center; gap: 14px;
    height: 64px; flex-shrink: 0;
  }
  .header-left { display:flex; align-items:center; gap:14px; flex:1; }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem; color: #fff;
    letter-spacing: 2px; line-height: 1; margin-top: 2px;
    order: 1;
  }
  .header-divider { width:1px; height:32px; background:rgba(255,255,255,0.3); order:2; }
  .logo-img { height: 34px; width: auto; order: 3; }

  @media (max-width: 480px) {
    .logo-img { display: none; }
    .header-divider { display: none; }
    .header-title { font-size: 2rem; }
  }

  /* SPINNER */
  .spinner-wrap { display:flex; flex-direction:column; align-items:center; gap:16px; padding:64px 0; }
  .spinner {
    width:36px; height:36px; border-radius:50%;
    border:3px solid var(--green-light); border-top-color:var(--green);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-text { color:var(--ink2); font-size:0.9rem; }

  /* MAIN */
  main { flex:1; display:flex; flex-direction:column; align-items:center; padding:32px 16px 64px; }

  /* NIVÅ-SKÄRM */
  .niva-screen { width:100%; max-width:480px; display:flex; flex-direction:column; align-items:center; gap:12px; }
  .niva-rubrik { font-family:'Source Sans 3', sans-serif; font-weight:600; font-size:1.5rem; color:var(--ink); margin-bottom:4px; text-align:center; }
  .niva-ingress { font-size:0.9rem; color:var(--ink2); margin-bottom:16px; text-align:center; }
  .niva-btn {
    width:100%; border:2px solid var(--border); background:var(--card);
    padding:18px 24px; border-radius:var(--radius);
    font-family:'Source Sans 3',sans-serif; cursor:pointer; text-align:left;
    transition:border-color 0.15s, background 0.15s;
    display:flex; align-items:center; gap:16px;
  }
  .niva-btn:hover { border-color:var(--green); background:var(--green-pale); }
  .niva-btn.challenge-btn:hover { border-color:var(--orange); background:var(--orange-pale); }
  .niva-badge {
    width:44px; height:44px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:1.1rem; font-weight:600; color:#fff;
  }
  .niva-badge.n1 { background: var(--n1); }
  .niva-badge.n2 { background: var(--n2); }
  .niva-badge.n3 { background: var(--n3); }
  .niva-badge.challenge { background: var(--orange); font-size:1.3rem; }
  .niva-text-wrap { display:flex; flex-direction:column; gap:2px; }
  .niva-name { font-size:1.05rem; font-weight:600; color:var(--ink); }
  .niva-count { font-size:0.82rem; color:var(--ink2); }
  .niva-divider { width:100%; border:none; border-top:1px solid var(--border); margin:4px 0; }

  /* MODE SELECTOR */
  .mode-selector {
    display:flex; gap:6px; margin-bottom:24px;
    background:var(--card); border:1.5px solid var(--border);
    border-radius:50px; padding:4px;
  }
  .mode-btn {
    border:none; background:none; padding:9px 24px; border-radius:50px;
    font-family:'Source Sans 3',sans-serif; font-size:0.92rem; font-weight:500;
    cursor:pointer; color:var(--ink2); transition:all 0.2s;
  }
  .mode-btn.active { background:var(--green); color:#fff; }

  /* BACK BUTTON */
  .back-btn {
    align-self:flex-start; margin-bottom:16px;
    border:none; background:none; color:var(--ink2);
    font-family:'Source Sans 3',sans-serif; font-size:0.88rem;
    cursor:pointer; display:flex; align-items:center; gap:6px; padding:0;
  }
  .back-btn:hover { color:var(--green); }

  /* FILTER BAR */
  .filter-bar { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:24px; justify-content:center; max-width:720px; }
  .cat-btn {
    border:1.5px solid var(--border); background:var(--card);
    padding:5px 16px; border-radius:50px;
    font-family:'Source Sans 3',sans-serif; font-size:0.82rem;
    cursor:pointer; color:var(--ink2); transition:all 0.18s;
  }
  .cat-btn.active { background:var(--green); border-color:var(--green); color:#fff; }

  /* CHALLENGE BANNER */
  .challenge-banner {
    width:100%; max-width:720px;
    background:var(--orange-pale); border:1.5px solid var(--orange);
    border-radius:var(--radius); padding:10px 18px;
    font-size:0.85rem; color:var(--orange); font-weight:600;
    margin-bottom:16px; text-align:center;
  }

  /* FLASHCARD */
  .card-wrap { width:100%; max-width:720px; perspective:1200px; margin-bottom:20px; }
  .card {
    width:100%;
    position:relative; transform-style:preserve-3d;
    transition:transform 0.52s cubic-bezier(0.45,0.05,0.55,0.95); cursor:pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    backface-visibility:hidden;
    background:var(--card); border:1.5px solid var(--border);
    border-radius:var(--radius);
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; text-align:center;
    padding: clamp(28px,4vw,52px) clamp(24px,5vw,60px);
    min-height: clamp(200px, 30vw, 320px);
  }
  .card-face.front { border-top:4px solid var(--green); }
  .card-face.back {
    position:absolute; inset:0;
    transform:rotateY(180deg);
    border-top:4px solid var(--orange);
    background:var(--green-pale);
  }
  /* Front is in flow (sets height), back is absolute */
  .card-face.front { position:relative; }

  .card-label { font-size:0.7rem; font-weight:600; letter-spacing:1.8px; text-transform:uppercase; color:var(--ink2); margin-bottom:14px; }
  .card-begrepp {
    font-family:'Source Sans 3', sans-serif; font-weight:600;
    font-size:clamp(1.5rem,4vw,2.6rem); line-height:1.25; color:var(--ink);
    word-break:break-word;
  }
  .card-forklaring {
    font-size:clamp(0.95rem,2.2vw,1.2rem); line-height:1.7; color:var(--ink);
    word-break:break-word;
  }
  .card-kategori { margin-top:14px; font-size:0.75rem; color:var(--orange); font-weight:600; letter-spacing:0.5px; text-transform:uppercase; }
  .card-hint { font-size:0.8rem; color:var(--ink2); margin-top:20px; }

  /* FC BUTTONS */
  .fc-btns { display:flex; gap:10px; width:100%; max-width:720px; margin-bottom:12px; }
  .fc-btn {
    flex:1; border:none; padding:14px 8px; border-radius:var(--radius);
    font-family:'Source Sans 3',sans-serif; font-size:0.9rem; font-weight:600;
    cursor:pointer; transition:opacity 0.15s, transform 0.1s;
  }
  .fc-btn:active { transform:scale(0.97); }
  .fc-btn.ratt   { background:var(--green); color:#fff; }
  .fc-btn.osaker { background:#f5a623; color:#fff; }
  .fc-btn.fel    { background:var(--orange); color:#fff; }
  .fc-btn:disabled { opacity:0.28; cursor:default; }

  /* KEYBOARD HINT */
  .keyboard-hint { font-size:0.74rem; color:var(--ink2); margin-bottom:20px; opacity:0.65; text-align:center; }

  /* QUIZ */
  .quiz-question {
    width:100%; max-width:720px; background:var(--card);
    border:1.5px solid var(--border); border-top:4px solid var(--green);
    border-radius:var(--radius);
    padding:clamp(20px,3vw,36px) clamp(20px,4vw,40px); margin-bottom:16px;
  }
  .quiz-label { font-size:0.7rem; font-weight:600; letter-spacing:1.8px; text-transform:uppercase; color:var(--ink2); margin-bottom:12px; }
  .quiz-begrepp { font-family:'Source Sans 3', sans-serif; font-weight:600; font-size:clamp(1.5rem,4vw,2.2rem); line-height:1.2; color:var(--ink); }
  .quiz-options { width:100%; max-width:720px; display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
  .opt-btn {
    width:100%; border:1.5px solid var(--border); background:var(--card);
    padding:14px 20px; border-radius:10px;
    font-family:'Source Sans 3',sans-serif; font-size:clamp(0.88rem,2vw,1rem);
    text-align:left; cursor:pointer;
    transition:border-color 0.15s, background 0.15s; color:var(--ink); line-height:1.4;
  }
  .opt-btn:hover:not(:disabled) { border-color:var(--green); background:var(--green-pale); }
  .opt-btn.correct { background:var(--green-pale); border-color:var(--green); color:var(--green-dark); font-weight:600; }
  .opt-btn.wrong   { background:var(--orange-pale); border-color:var(--orange); color:#7A2800; }
  .opt-btn:disabled { cursor:default; }

  /* NEXT BTN */
  .next-btn {
    border:none; background:var(--orange); color:#fff;
    padding:13px 36px; border-radius:50px;
    font-family:'Source Sans 3',sans-serif; font-size:0.95rem; font-weight:600;
    cursor:pointer; transition:opacity 0.15s; margin-bottom:20px;
  }
  .next-btn:hover { opacity:0.87; }

  /* PROGRESS */
  .progress-bar-wrap { width:100%; max-width:720px; height:5px; background:var(--green-light); border-radius:3px; margin-bottom:8px; }
  .progress-bar { height:100%; background:var(--green); border-radius:3px; transition:width 0.3s; }
  .progress-text { font-size:0.8rem; color:var(--ink2); margin-bottom:20px; text-align:center; }

  /* DONE */
  .done-card {
    width:100%; max-width:720px; background:var(--card);
    border:1.5px solid var(--border); border-top:4px solid var(--orange);
    border-radius:var(--radius);
    padding:clamp(32px,5vw,52px) clamp(24px,5vw,48px); text-align:center;
  }
  .done-card h2 { font-family:'Source Sans 3', sans-serif; font-weight:600; font-size:1.8rem; margin-bottom:8px; }
  .done-score { font-size:3.4rem; font-family:'Source Sans 3', sans-serif; font-weight:300; color:var(--green); margin-bottom:4px; }
  .done-sub { font-size:0.9rem; color:var(--ink2); margin-bottom:24px; }
  .done-buttons { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
  .done-btn {
    border:2px solid var(--green); background:none; color:var(--green);
    padding:11px 28px; border-radius:50px;
    font-family:'Source Sans 3',sans-serif; font-size:0.92rem; font-weight:600;
    cursor:pointer; transition:background 0.15s, color 0.15s;
  }
  .done-btn:hover { background:var(--green); color:#fff; }
  .done-btn.secondary { border-color:var(--border); color:var(--ink2); }
  .done-btn.secondary:hover { border-color:var(--ink2); background:none; color:var(--ink); }

  /* STATUS */
  .status { color:var(--ink2); font-size:0.9rem; text-align:center; padding:48px 0; }
  .status.error { color:var(--orange); }
  .sending { font-size:0.8rem; color:var(--ink2); text-align:center; margin-top:8px; }

  /* FOOTER */
  footer { background:var(--green-dark); text-align:center; padding:12px; font-size:0.72rem; color:rgba(255,255,255,0.45); letter-spacing:0.3px; }
</style>
</head>

<main id="mainArea">
  <div class="spinner-wrap">
    <div class="spinner"></div>
    <div class="spinner-text">Hämtar frågor…</div>
  </div>
</main>

<footer>Göinge utbildningscenter &nbsp;·&nbsp; Östra Göinge kommun &nbsp;·&nbsp; Skapad av Adam Kedert &nbsp;·&nbsp; Vibekodad med Claude (Anthropic)</footer>

<script>
const API = "https://script.google.com/macros/s/AKfycbxmxxsUdIs5qGIwpzWRualVLSEdm7zaIKDeF6IaE_hKG4fL52zO4ZkSMX38-uKzZqJShg/exec";

let allFragor=[], nivaFragor=[], filteredFragor=[], sessionStats={};
let mode="flashcard", currentIndex=0, isFlipped=false, answered=false;
let selectedKat="Alla", selectedNiva=null, isChallengeMode=false;
let globalStats={};

// ---- INIT ----
async function init() {
  try {
    const [fRes, sRes] = await Promise.all([
      fetch(API+"?action=getFragor"),
      fetch(API+"?action=getStatistik").catch(()=>null)
    ]);
    const fData = await fRes.json();
    if (!fData.fragor||fData.fragor.length===0) throw new Error();
    allFragor = fData.fragor;
    if (sRes) {
      try { const sData=await sRes.json(); if(sData.statistik) globalStats=sData.statistik; } catch(e){}
    }
    showNivaScreen();
  } catch(e) {
    document.getElementById("mainArea").innerHTML =
      '<div class="status error">Kunde inte hämta frågor. Kontrollera anslutningen.</div>';
  }
}

// ---- KEYBOARD ----
document.addEventListener("keydown", e => {
  const card = document.getElementById("fcCard");
  if (card) {
    if (e.code==="Space"||e.key===" ") { e.preventDefault(); flipCard(); return; }
    if (isFlipped) {
      if (e.key==="1") { e.preventDefault(); fcSvar(true); }
      if (e.key==="2") { e.preventDefault(); fcSvar(null); }
      if (e.key==="3") { e.preventDefault(); fcSvar(false); }
    }
  }
  const nb = document.querySelector(".next-btn");
  if (nb && (e.key==="Enter")) { e.preventDefault(); nb.click(); }
});

// ---- NIVÅ-SKÄRM ----
function showNivaScreen() {
  selectedNiva=null; isChallengeMode=false;
  const nivaer=[...new Set(allFragor.map(f=>f.niva).filter(Boolean))].sort();
  if(nivaer.length===0){selectNiva(null);return;}

  const badgeClasses=["n1","n2","n3"];

  const nivaCards = nivaer.map((n,i)=>{
    const count=allFragor.filter(f=>f.niva===n).length;
    const numMatch=n.match(/\d+/);
    const num=numMatch?numMatch[0]:(i+1);
    const bc=badgeClasses[i]||"n1";
    const label=n.toLowerCase().startsWith("nivå")?"Svenska "+n:n;
    return `<button class="niva-btn" onclick="selectNiva('${n}')">
      <div class="niva-badge ${bc}">${num}</div>
      <div class="niva-text-wrap">
        <span class="niva-name">${label}</span>
        <span class="niva-count">${count} begrepp</span>
      </div>
    </button>`;
  }).join("");

  // Utmaningsläge — visas per nivå om tillräcklig statistik finns
  const challengeCards = nivaer.map(n=>{
    const stats=globalStats[n]||[];
    const hard=stats.filter(s=>s.totalt>=5&&s.pctRatt!==null&&s.pctRatt<60);
    if(hard.length<3) return "";
    const label=n.toLowerCase().startsWith("nivå")?"Svenska "+n:n;
    return `<button class="niva-btn challenge-btn" onclick="selectChallenge('${n}')">
      <div class="niva-badge challenge">⚡</div>
      <div class="niva-text-wrap">
        <span class="niva-name">Utmaning – ${label}</span>
        <span class="niva-count">${hard.length} svåra begrepp</span>
      </div>
    </button>`;
  }).join("");

  document.getElementById("mainArea").innerHTML = `
    <div class="niva-screen">
      <div class="niva-rubrik">Välj din nivå</div>
      <div class="niva-ingress">Välj den nivå du studerar.</div>
      ${nivaCards}
      ${challengeCards ? '<hr class="niva-divider">'+challengeCards : ""}
    </div>
    <div class="sending" id="sendingMsg" style="display:none">Sparar resultat…</div>`;
}

function selectNiva(niva) {
  selectedNiva=niva; isChallengeMode=false;
  nivaFragor=niva?allFragor.filter(f=>f.niva===niva):allFragor;
  showAppScreen();
}

function selectChallenge(niva) {
  selectedNiva=niva; isChallengeMode=true;
  const stats=globalStats[niva]||[];
  const hardBegrepp=new Set(stats.filter(s=>s.totalt>=5&&s.pctRatt<60).map(s=>s.begrepp));
  nivaFragor=allFragor.filter(f=>f.niva===niva&&hardBegrepp.has(f.begrepp));
  if(nivaFragor.length===0) nivaFragor=allFragor.filter(f=>f.niva===niva);
  showAppScreen();
}

// ---- APP-SKÄRM ----
function showAppScreen() {
  selectedKat="Alla"; sessionStats={};
  const kats=["Alla",...new Set(nivaFragor.map(f=>f.kategori).filter(Boolean))];
  const filterHTML=kats.map(k=>`<button class="cat-btn${k==="Alla"?" active":""}" onclick="selectKat('${k}')">${k}</button>`).join("");
  const challengeBanner=isChallengeMode?`<div class="challenge-banner">⚡ Utmaningsläge — de svåraste begreppen</div>`:"";

  // I utmaningsläge: bara quiz. Annars: flashcard + quiz
  const modeHTML = isChallengeMode
    ? `<div class="mode-selector"><button class="mode-btn active" onclick="setMode('quiz')">Quiz</button></div>`
    : `<div class="mode-selector">
        <button class="mode-btn active" onclick="setMode('flashcard')">Flashcard</button>
        <button class="mode-btn" onclick="setMode('quiz')">Quiz</button>
       </div>`;

  document.getElementById("mainArea").innerHTML = `
    <button class="back-btn" onclick="showNivaScreen()">← Tillbaka</button>
    ${challengeBanner}
    ${modeHTML}
    <div class="filter-bar" id="filterBar">${filterHTML}</div>
    <div id="app"></div>
    <div class="sending" id="sendingMsg" style="display:none">Sparar resultat…</div>`;

  if(isChallengeMode) mode="quiz";
  applyFilter();
}

function selectKat(k) {
  selectedKat=k;
  const kats=["Alla",...new Set(nivaFragor.map(f=>f.kategori).filter(Boolean))];
  document.getElementById("filterBar").innerHTML=
    kats.map(k2=>`<button class="cat-btn${k2===k?" active":""}" onclick="selectKat('${k2}')">${k2}</button>`).join("");
  applyFilter();
}

function applyFilter() {
  filteredFragor=selectedKat==="Alla"?shuffle([...nivaFragor]):shuffle(nivaFragor.filter(f=>f.kategori===selectedKat));
  currentIndex=0; sessionStats={};
  renderCurrent();
}

function setMode(m) {
  mode=m;
  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.toggle("active",
    b.textContent.toLowerCase().includes(m==="flashcard"?"flash":"quiz")));
  applyFilter();
}

// ---- RENDER ----
function renderCurrent() {
  const app=document.getElementById("app");
  if(!app) return;
  if(filteredFragor.length===0){app.innerHTML=`<div class="status">Inga begrepp i den här kategorin.</div>`;return;}
  if(currentIndex>=filteredFragor.length){renderDone();return;}
  mode==="flashcard"?renderFlashcard():renderQuiz();
}

function progressHTML(){
  const pct=filteredFragor.length>0?Math.round((currentIndex/filteredFragor.length)*100):0;
  return `<div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
          <div class="progress-text">${currentIndex} / ${filteredFragor.length}</div>`;
}

// ---- FLASHCARD ----
function renderFlashcard(){
  const f=filteredFragor[currentIndex]; isFlipped=false;
  document.getElementById("app").innerHTML=`
    ${progressHTML()}
    <div class="card-wrap">
      <div class="card" id="fcCard" onclick="flipCard()">
        <div class="card-face front">
          <div class="card-label">Begrepp</div>
          <div class="card-begrepp">${f.begrepp}</div>
          ${f.kategori?`<div class="card-kategori">${f.kategori}</div>`:""}
          <div class="card-hint">Tryck för att se förklaring</div>
        </div>
        <div class="card-face back">
          <div class="card-label">Förklaring</div>
          <div class="card-forklaring">${f.forklaring}</div>
        </div>
      </div>
    </div>
    <div class="fc-btns">
      <button class="fc-btn fel"    onclick="fcSvar(false)" disabled>Visste inte</button>
      <button class="fc-btn osaker" onclick="fcSvar(null)"  disabled>Osäker</button>
      <button class="fc-btn ratt"   onclick="fcSvar(true)"  disabled>Kunde det!</button>
    </div>
    <div class="keyboard-hint">Mellanslag = vänd &nbsp;·&nbsp; 1 Kunde det &nbsp;·&nbsp; 2 Osäker &nbsp;·&nbsp; 3 Visste inte</div>`;
}

function flipCard(){
  const c=document.getElementById("fcCard"); isFlipped=!isFlipped;
  c.classList.toggle("flipped",isFlipped);
  if(isFlipped) document.querySelectorAll(".fc-btn").forEach(b=>b.disabled=false);
}

function fcSvar(result){
  // true=kunde, null=osäker, false=visste inte
  // Alla tre loggar och går vidare — ingen adaptiv kö
  const f=filteredFragor[currentIndex];
  if(result===true)  logStat(f.begrepp,true);
  else               logStat(f.begrepp,false);
  currentIndex++;
  renderCurrent();
}

// ---- QUIZ ----
function renderQuiz(){
  const f=filteredFragor[currentIndex]; answered=false;
  const opts=buildOptions(f);
  document.getElementById("app").innerHTML=`
    ${progressHTML()}
    <div class="quiz-question">
      <div class="quiz-label">Vad betyder…</div>
      <div class="quiz-begrepp">${f.begrepp}</div>
    </div>
    <div class="quiz-options">
      ${opts.map(o=>`<button class="opt-btn" onclick="quizSvar(this,${o.ratt},'${f.begrepp}')">${o.text}</button>`).join("")}
    </div>`;
}

function buildOptions(f){
  // Prioritera distraktorer från samma kategori
  const sammakat=nivaFragor.filter(x=>x.begrepp!==f.begrepp&&x.kategori===f.kategori);
  const ovrigt=nivaFragor.filter(x=>x.begrepp!==f.begrepp&&x.kategori!==f.kategori);
  // Fyll upp med övriga kategorier bara om det behövs (färre än 3 i samma kat)
  const pool=sammakat.length>=3
    ? shuffle(sammakat)
    : shuffle([...sammakat,...ovrigt]);
  return shuffle([{text:f.forklaring,ratt:true},...pool.slice(0,3).map(t=>({text:t.forklaring,ratt:false}))]);
}

function quizSvar(el,ratt,begrepp){
  if(answered)return; answered=true;
  logStat(begrepp,ratt);
  document.querySelectorAll(".opt-btn").forEach(b=>b.disabled=true);
  const cf=filteredFragor[currentIndex];
  document.querySelectorAll(".opt-btn").forEach(b=>{if(b.textContent.trim()===cf.forklaring)b.classList.add("correct");});
  if(!ratt) el.classList.add("wrong");
  const nb=document.createElement("button"); nb.className="next-btn";
  nb.textContent=currentIndex+1>=filteredFragor.length?"Se resultat":"Nästa →";
  nb.onclick=()=>{currentIndex++;renderCurrent();};
  document.getElementById("app").appendChild(nb);
}

// ---- DONE ----
function renderDone(){
  const total=Object.values(sessionStats).reduce((s,v)=>s+v.ratt+v.fel,0);
  const ratt=Object.values(sessionStats).reduce((s,v)=>s+v.ratt,0);
  const pct=total>0?Math.round((ratt/total)*100):0;
  document.getElementById("app").innerHTML=`
    <div class="done-card">
      <h2>Bra jobbat!</h2>
      <div class="done-score">${pct}%</div>
      <div class="done-sub">${ratt} rätt av ${total} svar</div>
      <div class="done-buttons">
        <button class="done-btn" onclick="applyFilter()">Kör igen</button>
        <button class="done-btn secondary" onclick="showNivaScreen()">Tillbaka</button>
      </div>
    </div>`;
  sparaResultat();
}

function logStat(b,r){if(!sessionStats[b])sessionStats[b]={ratt:0,fel:0};if(r)sessionStats[b].ratt++;else sessionStats[b].fel++;}

async function sparaResultat(){
  // Slå upp kategori per begrepp från nivaFragor
  const begreppKat={};
  nivaFragor.forEach(f=>{begreppKat[f.begrepp]=f.kategori||"";});
  const res=Object.entries(sessionStats).map(([b,s])=>({
    begrepp:b, niva:selectedNiva||"", kategori:begreppKat[b]||"", ratt:s.ratt, fel:s.fel
  }));
  if(!res.length)return;
  const sm=document.getElementById("sendingMsg"); if(sm)sm.style.display="block";
  try{await fetch(API,{method:"POST",body:JSON.stringify({action:"sparaStatistik",resultat:res}),headers:{"Content-Type":"text/plain"}});}catch(e){}
  if(sm)sm.style.display="none";
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

init();

// ---- FULLSCREEN ----
function toggleFullscreen() {
  const btn = document.getElementById("fsBtn");
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}

document.addEventListener("fullscreenchange", updateFsBtn);
document.addEventListener("webkitfullscreenchange", updateFsBtn);

function updateFsBtn() {
  const btn = document.getElementById("fsBtn");
  if (!btn) return;
  const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  btn.textContent = isFs ? "✕" : "⛶";
  btn.title = isFs ? "Avsluta helskärm" : "Helskärm";
}
</script>
